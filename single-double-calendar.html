            font-weight: 600;

    // 获取某一天的“基础单双休状态”（不考虑节假日）
    function getBaseWorkStatus(date, startWeekDate, startType, singleWorkDay) {
        const dayOfWeek = date.getDay();
        if (dayOfWeek >= 1 && dayOfWeek <= 5) return true;

        const currentDate = new Date(date);
        const currentDayOfWeek = currentDate.getDay();
        const monday = new Date(currentDate);
        const diffToMonday = currentDayOfWeek === 0 ? 6 : currentDayOfWeek - 1;
        monday.setDate(currentDate.getDate() - diffToMonday);
        monday.setHours(0, 0, 0, 0);

        const startBase = new Date(startWeekDate);
        startBase.setHours(0, 0, 0, 0);
        const startDayOfWeek = startBase.getDay();
        const startMonday = new Date(startBase);
        const startDiff = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
        startMonday.setDate(startBase.getDate() - startDiff);
        startMonday.setHours(0, 0, 0, 0);

        const weekDiff = Math.round((monday - startMonday) / (7 * 86400000));
        let isDoubleWeek = (startType === 'double');
        if (weekDiff % 2 !== 0) isDoubleWeek = !isDoubleWeek;

        if (isDoubleWeek) return false;
        else {
            if (singleWorkDay === 'saturday') return dayOfWeek === 6;
            else return dayOfWeek === 0;
        }
    }

    // 获取最终显示状态：法定放假 > 补班 > 基础单双休
    function getFinalStatus(date, baseWorkStatus, holidayInfo) {
        if (holidayInfo) {
            if (holidayInfo.type === 'holiday') {
                return { work: false, text: holidayInfo.name, cls: 'tag-holiday' };
            }
            if (holidayInfo.type === 'workday') {
                return { work: true, text: '班', cls: 'tag-work-holiday' };
            }
        }
        if (baseWorkStatus) {
            const dayOfWeek = date.getDay();
            if (dayOfWeek === 6 || dayOfWeek === 0) {
                return { work: true, text: '单休上班', cls: 'tag-single' };
            }
            return { work: true, text: '工作日', cls: '' };
        } else {
            return { work: false, text: '休', cls: 'tag-double' };
        }
    }

            monthCard.innerHTML = `
                <div class="month-header">${monthNames[m-1]} ${year}</div>
                <div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
                <div class="days-grid"></div>
            `;
            monthsGrid.appendChild(monthCard);

            const daysContainer = monthCard.querySelector('.days-grid');
            const startOffset = startWeekday === 0 ? 6 : startWeekday - 1;
            let dayCounter = 1;

            for (let i = 0; i < 42; i++) {
                if (i < startOffset || dayCounter > daysInMonth) {
                    const empty = document.createElement('div');
                    empty.className = 'day-cell';
                    empty.style.opacity = '0.3';
                    daysContainer.appendChild(empty);
                    continue;
                }

                const curDate = new Date(year, m-1, dayCounter);
                const dateStr = `${year}-${String(m).padStart(2, '0')}-${String(dayCounter).padStart(2, '0')}`;
                const holiday = getHolidayInfo(dateStr);
                const baseWork = getBaseWorkStatus(curDate, startBase, startType, singleWorkDay);
                const final = getFinalStatus(curDate, baseWork, holiday);

                const cell = document.createElement('div');
                cell.className = 'day-cell';

                const numSpan = document.createElement('div');
                numSpan.className = 'day-number';
                numSpan.innerText = dayCounter;

                const tagSpan = document.createElement('div');
                tagSpan.className = `day-tag ${final.cls}`;
                tagSpan.innerText = final.text;

                cell.appendChild(numSpan);
                cell.appendChild(tagSpan);
                daysContainer.appendChild(cell);

                dayCounter++;
            }
        }
    }

    // 初始化年份下拉
    const yearSelect = document.getElementById('yearSelect');
    const currentYear = new Date().getFullYear();
    for (let y = 2024; y <= 2028; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.innerText = y;
        if (y === currentYear && y >= 2024 && y <= 2028) opt.selected = true;
        if (y === 2026) opt.selected = true;
        yearSelect.appendChild(opt);
    }

    function generate() {
        const year = parseInt(yearSelect.value);
        const startDate = document.getElementById('startWeekDate').value;
        const startType = document.getElementById('startWeekType').value;
        const singleWorkDay = document.getElementById('singleWorkDay').value;
        if (!startDate) { alert("请选择起始周日期"); return; }
        renderCalendar(year, startDate, startType, singleWorkDay);
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('exportImgBtn').addEventListener('click', () => {
        const grid = document.getElementById('monthsGrid');
        if (!grid.children.length) { alert("请先生成日历"); return; }
        html2canvas(grid, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
            const link = document.createElement('a');
            link.download = `自定义单双休_${yearSelect.value}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }).catch(() => alert("截图失败"));
    });

    generate();
</script>
</body>
</html>
